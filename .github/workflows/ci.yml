# .github/workflows/ci.yml
# Continuous Integration (CI) Workflow Template for Automated Actions Checks
name: Prop-Firm Guardian CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code Base
      uses: actions/checkout@v4

    - name: Setup Node.js Operational Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Development Package Dependencies
      run: npm ci

    - name: Run Codebase Compilation Integrity Check
      run: npm run build

    - name: Execute ESLint Assertions Check
      run: npm run lint
